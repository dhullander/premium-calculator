<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Midterm Cancellation Premium Calculator</title>

  <!-- Diagonal airplane favicon -->
  <link rel="icon" type="image/svg+xml"
        href='data:image/svg+xml,
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
          <rect width="100" height="100" fill="%23ffe066"/>
          <g transform="rotate(-45 50 50)">
            <rect x="42" y="10" width="16" height="80" rx="8" fill="%23cc9900"/>
            <rect x="20" y="42" width="60" height="16" rx="2" fill="%23cc9900"/>
          </g>
        </svg>'>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #fffbe6;
      color: #333;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 20px;
    }

    /* Two-column layout */
    .layout {
      display: flex;
      gap: 40px;
      align-items: flex-start;
    }

    .container {
      background: #ffffff;
      padding: 25px;
      border-radius: 8px;
      width: 600px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      border-left: 6px solid #ffe066;
    }

    /* Right-side boxes */
    .side-box {
      background: #ffffff;
      padding: 20px;
      border-radius: 8px;
      width: 420px; /* a bit wider so everything fits comfortably */
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      border-left: 6px solid #7bbf8f;
      margin-bottom: 30px;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input {
      padding: 8px;
      margin-top: 5px;
      width: 250px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 15px;
      cursor: pointer;
      background: #ffe066;
      color: #333;
      border: none;
      border-radius: 4px;
      font-weight: bold;
    }

    button:hover {
      background: #ffdb4d;
    }

    .results {
      margin-top: 30px;
      padding: 20px;
      background: #f2f8f4;
      border-radius: 8px;
      max-width: 450px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      border-left: 6px solid #7bbf8f;
    }

    .section-title {
      font-size: 18px;
      margin-top: 15px;
      padding-bottom: 3px;
      margin-bottom: 6px;
      border-bottom: 2px solid #7bbf8f;
    }

    .section-title.short-rate {
      border-bottom: 2px solid #ff9999;
    }

    .result-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #d9e6dd;
      font-size: 14px;
      column-gap: 10px;
    }

    .result-value {
      width: 90px;
      text-align: right;
      font-weight: bold;
    }

    .copy-btn {
      padding: 2px 6px;
      font-size: 12px;
      cursor: pointer;
      background: #e6f5eb;
      border: 1px solid #7bbf8f;
      border-radius: 4px;
      color: #2f6f4e;
      margin-top: 0 !important;
    }

    .error {
      color: #b30000;
      font-weight: bold;
      margin-top: 10px;
    }

    /* Rate comparison rows */
    .rate-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }

    /* Smaller, more compact inputs for rate comparison */
    .rate-row input {
      width: 100%;
      padding: 6px;
      font-size: 13px;
    }

    .age-output {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="layout">

  <!-- LEFT COLUMN: Cancellation Calculator -->
  <div class="container">
    <h1>Midterm Cancellation Premium Calculator</h1>

    <form id="premiumForm" onsubmit="event.preventDefault(); calculate();">

      <label>Premium:</label>
      <input type="number" id="fullPremium" min="0" required>

      <label>Policy Start Date:</label>
      <input type="text" id="startDate" placeholder="MM/DD/YYYY" required>

      <label>Policy End Date:</label>
      <input type="text" id="endDate" placeholder="MM/DD/YYYY" required>

      <label>Cancellation Date:</label>
      <input type="text" id="cancelDate" placeholder="MM/DD/YYYY" required>

      <div id="errorMessage" class="error" style="display:none;"></div>

      <button type="submit">Calculate</button>
    </form>

    <div class="results" id="results" style="display:none;">

      <div class="section-title">Pro‑Rata</div>

      <div class="result-row">
        <span>Earned Premium:</span>
        <span class="result-value" id="prEarned"></span>
        <button class="copy-btn" onclick="copyValue('prEarned')">Copy</button>
      </div>

      <div class="result-row">
        <span>Unearned Premium (return):</span>
        <span class="result-value" id="prUnearned"></span>
        <button class="copy-btn" onclick="copyValue('prUnearned')">Copy</button>
      </div>

      <div class="result-row">
        <span>Pro‑Rata Factor:</span>
        <span class="result-value" id="prFactor"></span>
        <button class="copy-btn" onclick="copyValue('prFactor')">Copy</button>
      </div>

      <div class="section-title short-rate">Short‑Rate (10% Penalty)</div>

      <div class="result-row">
        <span>Earned Premium:</span>
        <span class="result-value" id="srEarned"></span>
        <button class="copy-btn" onclick="copyValue('srEarned')">Copy</button>
      </div>

      <div class="result-row">
        <span>Unearned Premium (return):</span>
        <span class="result-value" id="srUnearned"></span>
        <button class="copy-btn" onclick="copyValue('srUnearned')">Copy</button>
      </div>

      <div class="result-row">
        <span>Short‑Rate Factor:</span>
        <span class="result-value" id="srFactor"></span>
        <button class="copy-btn" onclick="copyValue('srFactor')">Copy</button>
      </div>

    </div>
  </div>

  <!-- RIGHT COLUMN: Two separate boxes -->
  <div>

    <!-- RATE COMPARISON BOX -->
    <div class="side-box">
      <h2>Rate Comparison Calculator</h2>

      <div id="rateRows"></div>

      <button onclick="addRateRow()">Add Row</button>
    </div>

    <!-- AGE CALCULATOR BOX -->
    <div class="side-box">
      <h2>Age Calculator</h2>

      <label>Birthdate (MM/DD/YYYY):</label>
      <input type="text" id="birthdate" placeholder="MM/DD/YYYY" oninput="calculateAge()">

      <div class="age-output">Age: <span id="ageResult"></span></div>
    </div>

  </div>

</div>

<script>
  /* Shared date parser */
  function parseDate(input) {
    if (!input) return null;
    const parts = input.trim().split('/');
    if (parts.length !== 3) return null;
    const m = parseInt(parts[0], 10);
    const d = parseInt(parts[1], 10);
    const y = parseInt(parts[2], 10);
    const date = new Date(y, m - 1, d);
    if (date.getMonth() !== m - 1 || date.getDate() !== d || date.getFullYear() !== y) {
      return null;
    }
    return date;
  }

  function formatDate(date) {
    return `${date.getMonth()+1}/${date.getDate()}/${date.getFullYear()}`;
  }

  window.onload = function () {
    document.getElementById("cancelDate").value = formatDate(new Date());
    addRateRow(); addRateRow(); addRateRow();
  };

  /* Cancellation calculator */
  function calculate() {
    const premium = parseFloat(document.getElementById('fullPremium').value);
    const start = parseDate(document.getElementById('startDate').value);
    const end = parseDate(document.getElementById('endDate').value);
    const cancel = parseDate(document.getElementById('cancelDate').value);

    const errorBox = document.getElementById("errorMessage");
    errorBox.style.display = "none";

    if (!start || !end || !cancel) {
      errorBox.textContent = "Please enter valid dates in MM/DD/YYYY format.";
      errorBox.style.display = "block";
      return;
    }

    if (cancel < start || cancel > end) {
      errorBox.textContent = "Cancellation date is not within the effective period.";
      errorBox.style.display = "block";
      return;
    }

    const msDay = 1000 * 60 * 60 * 24;
    const totalDays = Math.round((end - start) / msDay) + 1;
    const usedDays = Math.round((cancel - start) / msDay) + 1;

    const earned = premium * (usedDays / totalDays);
    const unearned = premium - earned;

    const penalty = unearned * 0.10;
    const shortRateUnearned = unearned - penalty;

    document.getElementById("prEarned").textContent = "$" + earned.toFixed(2);
    document.getElementById("prUnearned").textContent = "$" + unearned.toFixed(2);
    document.getElementById("prFactor").textContent = (unearned / premium).toFixed(4);

    document.getElementById("srEarned").textContent = "$" + earned.toFixed(2);
    document.getElementById("srUnearned").textContent = "$" + shortRateUnearned.toFixed(2);
    document.getElementById("srFactor").textContent = (shortRateUnearned / premium).toFixed(4);

    document.getElementById("results").style.display = "block";
  }

  function copyValue(id) {
    const value = document.getElementById(id).textContent;
    navigator.clipboard.writeText(value);
  }

  /* Rate comparison calculator */
  function addRateRow() {
    const container = document.getElementById("rateRows");

    const row = document.createElement("div");
    row.className = "rate-row";

    row.innerHTML = `
      <input type="number" placeholder="Hull Value" oninput="updateRate(this)">
      <input type="number" placeholder="Premium" oninput="updateRate(this)">
      <input type="text" placeholder="Rate" readonly>
    `;

    container.appendChild(row);
  }

  function updateRate(el) {
    const row = el.parentElement;
    const hull = parseFloat(row.children[0].value);
    const prem = parseFloat(row.children[1].value);

    if (hull > 0 && prem >= 0) {
      row.children[2].value = (prem / hull).toFixed(4);
    } else {
      row.children[2].value = "";
    }
  }

  /* Age calculator */
  function calculateAge() {
    const input = document.getElementById("birthdate").value;
    const dob = parseDate(input);
    const out = document.getElementById("ageResult");

    if (!dob) {
      out.textContent = "";
      return;
    }

    const today = new Date();
    let age = today.getFullYear() - dob.getFullYear();

    const m = today.getMonth() - dob.getMonth();
    if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) {
      age--;
    }

    out.textContent = age;
  }
</script>

</body>
</html>
