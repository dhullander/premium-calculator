<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Midterm Cancellation Premium Calculator</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 30px; background: #f7f7f7; }
    h1 { font-size: 24px; }
    label { display: block; margin-top: 12px; font-weight: bold; }
    input { padding: 6px; margin-top: 4px; width: 220px; }
    button { margin-top: 18px; padding: 10px 20px; font-size: 15px; cursor: pointer; }
    .results { margin-top: 25px; padding: 15px; border: 1px solid #ccc; background: #fff; max-width: 450px; }
    .results div { margin: 6px 0; }
  </style>
</head>
<body>

<h1>Midterm Cancellation Premium Calculator</h1>

<form id="premiumForm" onsubmit="event.preventDefault(); calculate();">

  <label>
    Full Policy Premium ($):
    <input type="number" id="fullPremium" step="0.01" min="0" required>
  </label>

  <label>
    Policy Start Date:
    <input type="text" id="startDate" placeholder="MM/DD/YYYY" required>
  </label>

  <label>
    Policy End Date:
    <input type="text" id="endDate" placeholder="MM/DD/YYYY" required>
  </label>

  <label>
    Cancellation Date:
    <input type="text" id="cancelDate" placeholder="MM/DD/YYYY" required>
  </label>

  <label>
    Short-Rate Penalty (% of unearned premium):
    <input type="number" id="shortRatePenalty" step="0.01" min="0" max="100" value="10">
  </label>

  <button type="submit">Calculate</button>
</form>

<div class="results" id="results" style="display:none;">
  <div><strong>Total Policy Days:</strong> <span id="totalDays"></span></div>
  <div><strong>Days Used:</strong> <span id="daysUsed"></span></div>
  <div><strong>Earned Premium:</strong> $<span id="earnedPremium"></span></div>
  <div><strong>Unearned Premium (Pro-Rata):</strong> $<span id="unearnedPremium"></span></div>
  <div><strong>Pro-Rata Refund:</strong> $<span id="proRataRefund"></span></div>
  <div><strong>Short-Rate Penalty Amount:</strong> $<span id="shortRatePenaltyAmount"></span></div>
  <div><strong>Short-Rate Refund:</strong> $<span id="shortRateRefund"></span></div>
</div>

<script>
  function parseDate(input) {
    if (!input) return null;
    const trimmed = input.trim();
    const parts = trimmed.split('/');
    if (parts.length !== 3) return null;

    const month = parseInt(parts[0], 10);
    const day = parseInt(parts[1], 10);
    const year = parseInt(parts[2], 10);

    if (isNaN(month) || isNaN(day) || isNaN(year)) return null;
    if (month < 1 || month > 12) return null;
    if (day < 1 || day > 31) return null;

    const d = new Date(year, month - 1, day);
    // Validate that JS didn't roll the date (e.g., 2/30 -> 3/2)
    if (d.getFullYear() !== year || d.getMonth() !== month - 1 || d.getDate() !== day) {
      return null;
    }
    return d;
  }

  function calculate() {
    const fullPremium = parseFloat(document.getElementById('fullPremium').value) || 0;

    const startDate = parseDate(document.getElementById('startDate').value);
    const endDate = parseDate(document.getElementById('endDate').value);
    const cancelDate = parseDate(document.getElementById('cancelDate').value);

    const shortRatePenaltyPercent = parseFloat(document.getElementById('shortRatePenalty').value) || 0;

    if (!startDate || !endDate || !cancelDate) {
      alert("Please enter valid dates in MM/DD/YYYY format, e.g. 6/29/2025.");
      return;
    }

    if (cancelDate < startDate || cancelDate > endDate) {
      alert("Cancellation date must be between the policy start and end dates.");
      return;
    }

    if (fullPremium <= 0) {
      alert("Please enter a premium greater than 0.");
      return;
    }

    const msPerDay = 1000 * 60 * 60 * 24;

    const totalDays = Math.round((endDate - startDate) / msPerDay) + 1;
    const usedDays = Math.round((cancelDate - startDate) / msPerDay) + 1;

    if (totalDays <= 0 || usedDays < 1 || usedDays > totalDays) {
      alert("There is an issue with the dates. Please double-check them.");
      return;
    }

    const earnedPremium = fullPremium * (usedDays / totalDays);
    const unearnedPremium = fullPremium - earnedPremium;
    const proRataRefund = unearnedPremium;

    const penaltyFactor = shortRatePenaltyPercent / 100;
    const shortRatePenaltyAmount = unearnedPremium * penaltyFactor;
    const shortRateRefund = unearnedPremium - shortRatePenaltyAmount;

    document.getElementById('totalDays').textContent = totalDays;
    document.getElementById('daysUsed').textContent = usedDays;
    document.getElementById('earnedPremium').textContent = earnedPremium.toFixed(2);
    document.getElementById('unearnedPremium').textContent = unearnedPremium.toFixed(2);
    document.getElementById('proRataRefund').textContent = proRataRefund.toFixed(2);
    document.getElementById('shortRatePenaltyAmount').textContent = shortRatePenaltyAmount.toFixed(2);
    document.getElementById('shortRateRefund').textContent = shortRateRefund.toFixed(2);

    document.getElementById('results').style.display = 'block';
  }
</script>

</body>
</html>
