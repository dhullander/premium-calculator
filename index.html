<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Midterm Cancellation Premium Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f4f4f4;
      color: #333;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 20px;
    }

    .container {
      background: #fff;
      padding: 25px;
      border-radius: 8px;
      max-width: 600px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input {
      padding: 8px;
      margin-top: 5px;
      width: 250px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 15px;
      cursor: pointer;
      background: #0078d4;
      color: white;
      border: none;
      border-radius: 4px;
    }

    button:hover {
      background: #005fa3;
    }

    .results {
      margin-top: 30px;
      padding: 20px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .section-title {
      font-size: 18px;
      margin-top: 15px;
      border-bottom: 2px solid #0078d4;
      padding-bottom: 3px;
      margin-bottom: 6px;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    .result-row:last-child {
      border-bottom: none;
    }

    .error {
      color: #b30000;
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Midterm Cancellation Premium Calculator</h1>

  <form id="premiumForm" onsubmit="event.preventDefault(); calculate();">

    <label>Full Policy Premium ($):</label>
    <input type="number" id="fullPremium" step="0.01" min="0" required>

    <label>Policy Start Date:</label>
    <input type="text" id="startDate" placeholder="MM/DD/YYYY" required>

    <label>Policy End Date:</label>
    <input type="text" id="endDate" placeholder="MM/DD/YYYY" required>

    <label>Cancellation Date:</label>
    <input type="text" id="cancelDate" placeholder="MM/DD/YYYY" required>

    <div id="errorMessage" class="error" style="display:none;"></div>

    <button type="submit">Calculate</button>
  </form>
</div>

<div class="results" id="results" style="display:none;">

  <div class="section-title">Pro‑Rata</div>
  <div class="result-row"><span>Earned Premium:</span> <span id="prEarned"></span></div>
  <div class="result-row"><span>Unearned Premium (return):</span> <span id="prUnearned"></span></div>
  <div class="result-row"><span>Pro‑Rata Factor:</span> <span id="prFactor"></span></div>

  <div class="section-title">Short‑Rate (10% Penalty)</div>
  <div class="result-row"><span>Earned Premium:</span> <span id="srEarned"></span></div>
  <div class="result-row"><span>Unearned Premium (return):</span> <span id="srUnearned"></span></div>
  <div class="result-row"><span>Short‑Rate Factor:</span> <span id="srFactor"></span></div>

</div>

<script>
  function parseDate(input) {
    if (!input) return null;
    const parts = input.trim().split('/');
    if (parts.length !== 3) return null;

    const m = parseInt(parts[0], 10);
    const d = parseInt(parts[1], 10);
    const y = parseInt(parts[2], 10);

    const date = new Date(y, m - 1, d);
    if (date.getMonth() !== m - 1 || date.getDate() !== d || date.getFullYear() !== y) {
      return null;
    }
    return date;
  }

  function formatDate(date) {
    return `${date.getMonth()+1}/${date.getDate()}/${date.getFullYear()}`;
  }

  // Auto-fill cancellation date with today's date
  window.onload = function () {
    document.getElementById("cancelDate").value = formatDate(new Date());
  };

  // Auto-fill end date = start date + 1 year
  document.getElementById("startDate").addEventListener("input", function () {
    const start = parseDate(this.value);
    if (start) {
      const end = new Date(start);
      end.setFullYear(end.getFullYear() + 1);
      document.getElementById("endDate").value = formatDate(end);
    }
  });

  function calculate() {
    const premium = parseFloat(document.getElementById('fullPremium').value);
    const start = parseDate(document.getElementById('startDate').value);
    const end = parseDate(document.getElementById('endDate').value);
    const cancel = parseDate(document.getElementById('cancelDate').value);

    const errorBox = document.getElementById("errorMessage");
    errorBox.style.display = "none";

    if (!start || !end || !cancel) {
      errorBox.textContent = "Please enter valid dates in MM/DD/YYYY format.";
      errorBox.style.display = "block";
      return;
    }

    if (cancel < start || cancel > end) {
      errorBox.textContent = "Cancellation date is not within the effective period.";
      errorBox.style.display = "block";
      return;
    }

    const msDay = 1000 * 60 * 60 * 24;
    const totalDays = Math.round((end - start) / msDay) + 1;
    const usedDays = Math.round((cancel - start) / msDay) + 1;

    const earned = premium * (usedDays / totalDays);
    const unearned = premium - earned;

    // Short‑rate = 10% penalty on unearned premium
    const penalty = unearned * 0.10;
    const shortRateUnearned = unearned - penalty;

    // Populate Pro‑Rata
    document.getElementById("prEarned").textContent = earned.toFixed(2);
    document.getElementById("prUnearned").textContent = unearned.toFixed(2);
    document.getElementById("prFactor").textContent = (unearned / premium).toFixed(4);

    // Populate Short‑Rate
    document.getElementById("srEarned").textContent = earned.toFixed(2);
    document.getElementById("srUnearned").textContent = shortRateUnearned.toFixed(2);
    document.getElementById("srFactor").textContent = (shortRateUnearned / premium).toFixed(4);

    document.getElementById("results").style.display = "block";
  }
</script>

</body>
</html>
